name: Seed Livebook Library

# CEO-163 Phase 0 seeding pipeline. Manually triggered from the GitHub UI so
# the founder doesn't need a local Node environment, fal.ai/Anthropic/Voyage
# CLIs, or anything else installed. Just paste keys into repo Actions secrets
# once, then click "Run workflow".
#
# To run:
#   1. Go to https://github.com/nawrasalali/penworth-new/actions
#   2. Click "Seed Livebook Library" in the left sidebar
#   3. Click "Run workflow" (top right)
#   4. Choose style (vintage_painting | cinematic_photoreal)
#   5. Choose count (start with 5 for a sanity check, then 100 for smoke seed)
#   6. Click green "Run workflow"
#
# Required repo Actions secrets (Settings → Secrets and variables → Actions):
#   FAL_KEY                       fal.ai (https://fal.ai/dashboard/keys)
#   ANTHROPIC_API_KEY             Anthropic Console (https://console.anthropic.com/settings/keys)
#   VOYAGE_API_KEY                Voyage AI (https://dash.voyageai.com)
#   NEXT_PUBLIC_SUPABASE_URL      Already needed for prod; copy from Vercel env
#   SUPABASE_SERVICE_ROLE_KEY     Already exists for prod; copy from Vercel env

on:
  workflow_dispatch:
    inputs:
      style:
        description: 'Visual style to seed'
        required: true
        default: 'vintage_painting'
        type: choice
        options:
          - vintage_painting
          - cinematic_photoreal
      count:
        description: 'How many prompts to process this run (start small)'
        required: true
        default: '5'
        type: choice
        options:
          - '5'
          - '25'
          - '100'
          - '500'
          - 'all'
      dry_run:
        description: 'Dry run (no API spend, inserts placeholder rows for plumbing tests)'
        required: true
        default: false
        type: boolean
      force:
        description: 'Reprocess prompts that already have a row (NOT recommended — costs money)'
        required: true
        default: false
        type: boolean

concurrency:
  group: seed-livebook-library-${{ inputs.style }}
  cancel-in-progress: false

jobs:
  seed:
    name: Seed ${{ inputs.style }} (${{ inputs.count }} prompts)
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Verify required secrets are present
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          missing=""
          if [ -z "$FAL_KEY" ] && [ "${{ inputs.dry_run }}" != "true" ]; then missing="$missing FAL_KEY"; fi
          if [ -z "$ANTHROPIC_API_KEY" ] && [ "${{ inputs.dry_run }}" != "true" ]; then missing="$missing ANTHROPIC_API_KEY"; fi
          if [ -z "$VOYAGE_API_KEY" ] && [ "${{ inputs.dry_run }}" != "true" ]; then missing="$missing VOYAGE_API_KEY"; fi
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then missing="$missing NEXT_PUBLIC_SUPABASE_URL"; fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then missing="$missing SUPABASE_SERVICE_ROLE_KEY"; fi
          if [ -n "$missing" ]; then
            echo "::error::Missing required Actions secrets:$missing"
            echo "Add them at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "All required secrets present."

      - name: Run seeding script
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -e
          ARGS="--style ${{ inputs.style }} --concurrency 4"
          if [ "${{ inputs.count }}" = "all" ]; then
            ARGS="$ARGS --all"
          else
            ARGS="$ARGS --count ${{ inputs.count }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          echo "Running: npx tsx scripts/seed_livebook_library.ts $ARGS"
          npx tsx scripts/seed_livebook_library.ts $ARGS

      - name: Print library size after run
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -s "${NEXT_PUBLIC_SUPABASE_URL}/rest/v1/livebook_styles?select=slug,library_size&order=display_order" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" || true
